<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>
</head>
<body>
    <h1>Product List</h1>
    <table border="1">
        <tr>
            <th>상품 이름</th>
            <th>가격</th>
            <th>담기</th>
        </tr>
        {% for item in list %}
        <tr>
        <th>{{ item['name'] }}</th>
        <th>{{ item['price'] }}</th>
        <th><a href="/add-cart/{{ item['id']}}">담기</a></th>
        </tr>
        {% endfor %}
        
    </table>
   
    <a href="/cart">Cart</a>
</body>
</html>
