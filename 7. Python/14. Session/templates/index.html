<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Login</h1>
    <form method="post">
        <input id="userId" name="userId" type="text" placeholder="Enter your Id">
        <input id="userPw" name="userPw" type="password" placeholder="Enter your password">
        <input type="submit" value="Login">
    </form>
    {% if error %}
        <p style="color: red;">{{error}}</p>
    {% endif %}
</body>
</html>
