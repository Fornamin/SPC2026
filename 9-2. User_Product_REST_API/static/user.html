<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User</title>
</head>
<body>
    <h1>User List</h1>
    <form id="search">
        <label>Enter user id <input type="number"></label>
        <button type="submit"></button>
    </form>
    <script>
        document.getElementById('search').addEventListener('submit', (ev) => {
            ev.preventDefault();

            const id = document.getElementById('id').value;
            fetch(`/user/${id}`).then(res => {
                res.json()
                console.log("success");
            })
        });
    </script>
</body>
</html>
