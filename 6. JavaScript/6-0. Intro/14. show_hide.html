<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #myDiv {
            display: block;
            width: 200px;
            height: 200px;
            background-color: lightsalmon;
        }
    </style>
</head>
<body>
    <h1>Show / Hide</h1>
    <button onclick="fixedShowAndHide()">Hiddle Element Toggle</button>
    <div id="myDiv">이것은 숨겨진 Div입니다.</div>
    <script>
        function showAndHide() {
            const div = document.querySelector('#myDiv');
            
            // DOM에는 CSS 내용이 들어가지 않음
            // 그래서 inline으로 적용된 것만 가져옴(style X)
            if (div.style.display == 'block')
                div.style.display = 'none';
            else 
                div.style.display = 'block';
        }

        function fixedShowAndHide() {
            const div = document.querySelector('#myDiv');
            // CSS가 적용된 결과값을 가져옴
            const displayStyle = window.getComputedStyle(div).display;

            if (displayStyle == 'none') {
                div.style.display = 'block';
            } else {
                div.style.display = 'none';
            }
        }
    </script>
</body>
</html>
