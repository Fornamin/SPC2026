<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function heyHello() {
            console.log('Hey!');
            
            document.write('<h1>Hello!</h1>');
            document.write('<p>');
            document.write('Hello Again');
            document.write('</p>');

            for (let i = 0; i <= 5; i++) {
                document.write('Num: ' + i + '<br>');
            }
        }

        heyHello();

    </script>
</body>
</html>
