<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #myDiv {
            width: 200px;
            height: 200px;
            background-color: lightsalmon;
        }

        .show {
            display: block;
        }

        .hide {
            display: none;
        }

    </style>
</head>
<body>
    <h1>Show / Hide</h1>
    <button onclick="showAndHideToggle()">Hiddle Element Toggle</button>
    <div id="myDiv">이것은 숨겨진 Div입니다.</div>
    <script>
        document.querySelector('#myDiv').classList.add('hide');
        function showAndHideToggle() {
            const div = document.querySelector('#myDiv');
            div.classList.toggle('show');
            div.classList.toggle('hide');
        }
    </script>
</body>
</html>
