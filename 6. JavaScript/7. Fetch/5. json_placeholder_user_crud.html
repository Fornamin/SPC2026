<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>외부 Req Test</h1>
    <input type="number" id="uid"></input>
    <button id="loadBtn">Search</button>
    <button id="saveBtn">Submit</button>
    <button id="delBtn">Delete</button>
    <button id="modBtn">Modify</button>
    <div class="" id="result"><!-- result --></div>
    <script>
        // PUT
        document.getElementById('modBtn').addEventListener('click', () => {
            const input = document.getElementById('uid').value;
            const putData = {
                title: 'hello',
                body: 'world',
                userId: input,
                id: input
            }

            fetch(`https://jsonplaceholder.typicode.com/posts/${input}`, {
                method: 'PUT',
                headers: {
                    'content-type': 'application/json; charset=UTF-8'
                },
                body: JSON.stringify(putData)
            })
            .then(res => res.json())
            .then(data => console.log(data))
        });

        // DELETE
        document.getElementById('delBtn').addEventListener('click', () => {
            const input = document.getElementById('uid').value;

            fetch(`https://jsonplaceholder.typicode.com/posts/${input}`, {
                method: 'DELETE'
            })
        });

        // POST
        document.getElementById('saveBtn').addEventListener('click', () => {
            const postData = {
                title: 'title',
                body: 'body',
                userId: 1
            }
            
            fetch(`https://jsonplaceholder.typicode.com/posts`, {
                method: 'POST',
                headers: {
                    'content-type': 'application/json; charset=UTF-8'
                },
                body: JSON.stringify(postData)
            })
            .then(res => res.json())
            .then(data => {
                console.log(data);
            });
        });

        // GET
        function printUser(data) {
            const resultDiv = document.getElementById('result');

            resultDiv.innerHTML = `
                    <h4>${data.name}</h4>
                    <ul>
                        <li>${data.username}</li>
                        <li>${data.email}</li>
                        <li>${data.address.city}</li></ul>
                `;
        }
        document.getElementById('loadBtn').addEventListener('click', () => {
            const input = document.getElementById('uid').value;
            fetch(`https://jsonplaceholder.typicode.com/users/`).then((res) => {
                return res.json();
            })
            .then((data) => {
                for (let i = 0; i < data.length; i++) {
                    if (data[i].id == input)
                        printUser(data[i]);
                }
            })
            .catch((e) => {
                console.log('parsing error');
            })
        });
    </script>
</body>

</html>
