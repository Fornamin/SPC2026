<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>외부 Req Test</h1>
    <button id="loadBtn">Data Req</button>
    <div class="" id="result"><!-- result --></div>
    <script>
        let cnt = 1;

        document.getElementById('loadBtn').addEventListener('click', () => {
            fetch(`https://jsonplaceholder.typicode.com/users/${cnt}`).then((res) => {
                return res.json();
            }).then((data) => {
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                    <h4>${data.name}</h4>
                    <ul>
                        <li>${data.username}</li>
                        <li>${data.email}</li>
                        <li>${data.address.city}</li></ul>
                `;
                console.log('parsed data: ', data);
                if (cnt < 9)
                    cnt = cnt + 1;
            }).catch((e) => {
                console.log('parsing error');
            })});
    </script>
</body>
</html>
