<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Dog is cute</h1>
    <button id="dogBtn">Look at dogs!</button><hr>
    <div id="dogDiv"></div>
</body>
<script>
    const dogDiv = document.getElementById('dogDiv');
    const dogBtn = document.getElementById('dogBtn').addEventListener('click', () => {
        fetch('https://dog.ceo/api/breeds/image/random')
        .then(res => res.json())
        .then((data) => {
            dogDiv.innerHTML = `<img src="${data.message}" width='500px'>`;
        })
        .catch(e => console.error('can\'t load imgs'))
    });
</script>
</html>
