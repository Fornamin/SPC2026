<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            text-align: center;
            margin-bottom: 50px;
        }
        .slider {
            display: flex;
            flex-direction: column;
            margin: 0 auto;
            text-align: center;
            max-width: 1000px;
            align-items: center;
        }
        .slider img {
            max-width: 100%;
            height: 300px;
            display: none;
        }
        .slider img.active {
            display: block;
        }
        .buttons {
            margin-top: 20px;
        }
        button {
            padding: 10px;
            font-size: 20px;
            border-radius: 50%;
            margin: 10px;
        }
    </style>
</head>

<body>
    <h1>Image Slider</h1>
    <div class="slider">
        <img src="img/mi1.png" id="img1" class="active">
        <img src="img/mi2.png" id="img2">
        <img src="img/mi3.png" id="img3"><hr>
        <div class="filename" id="filename">img/</div>
        <div class="buttons">
            <button id="prevBtn" disabled="true">Prev</button>
            <button id="nextBtn">Next</button>
        </div>
    </div>
    <script>
        const img_src = ['img/mi1.png', 'img/mi2.png', 'img/mi3.png'];
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // Setting
        let idx = 0;
        document.getElementById('filename').textContent = img_src[idx];

        // PrevBtn
        prevBtn.addEventListener('click', () => {
            /* 1. 무한 루프

            idx--;
            if (idx < 0)
                idx = idx + img_src.length;

            changeImg(idx);
            */

            /* 2. 제한적 반복 */
            removeImg(idx);

            if (idx <= 1)
                prevBtn.disabled = true;

            if (idx > 0) {
                nextBtn.disabled = false;                
                idx--;
                changeImg(idx);
            }
        });

        // Next Btn
        nextBtn.addEventListener('click', () => {
            /* 1. 무한 루프
            idx++;
            if (idx >= img_src.length)
                idx = idx - img_src.length;

            changeImg(idx);
            */

            /* 2. 제한적 반복 */
            removeImg(idx);
            if (idx >= img_src.length - 2) {
                nextBtn.disabled = true;
            } 
            if (idx < img_src.length - 1) {
                prevBtn.disabled = false;
                idx++;
                changeImg(idx);
            }
        });

        function removeImg(idx) {
            document.getElementById(`img${idx + 1}`).classList.remove('active');
        }

        function changeImg(idx) {
            document.getElementById('filename').textContent = img_src[idx];            
            document.getElementById(`img${idx + 1}`).classList.add('active');

            // class 속성을 이용하는 것이 아닌 img src 자체를 교체하는 방식
            // document.getElementById('img1').src = img_src[idx];
        }
    </script>
</body>
</html>
