<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StopWatch</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        p {
            margin: 15px;
            padding: 20px;
            font-size: 120px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #222;
        }
        .stopwatch-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 5px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transition: 0.2s ease;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        #startBtn {
           background-color: #4CAF50;
           color: white;
        }

        #stopBtn {
           background-color: #f44336;
           color: white;
        }

        #resetBtn {
            background-color: #2196F3;
            color: white;
        }

        #date {
            margin: 0;
            padding: 0;
            font-size: 24px;
            font-weight: 500;
            letter-spacing: 2px;
            color: #222;
        }

        #stopwatch-time {
            margin-bottom: 120px;
        }
    </style>
</head>

<body>
    <div class="stopwatch-box">
        <p id="date">your stopwatch</p>
        <p id="stopwatch-time">00:00:00</p>
        <!-- <button id="mode">Dark Mode</button> -->
        <div class="btn-group">
            <button id="startBtn">Start</button>
            <button id="stopBtn">Stop</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>
    <script>
        const timer = document.getElementById('stopwatch-time');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resetBtn = document.getElementById('resetBtn');

        let timerId;
        let min = 0;
        let sec = 0;
        let msec = 0;

        startBtn.addEventListener('click', startTimer);
        stopBtn.addEventListener('click', () => {
            clearInterval(timerId);
            startBtn.disabled = false;
        });
        resetBtn.addEventListener('click', () => {
            clearInterval(timerId);
            min = 0; msec = 0; sec = 0;
            updateTimer();
        });
        // document.getElementById('mode').addEventListener('click', () => {
        //     document.body.style.backgroundColor = '#222';
        //     document.getElementsByTagNameNS('p').style.color = '#f5f5f5';
        // })

        function startTimer() {
            startBtn.disabled = true;

            timerId = setInterval(() => {
                if (msec >= 1000) {
                    sec++;
                    msec -= 1000;
                }
                if (sec >= 60) {
                    min++;
                    sec -= 60;
                }

                updateTimer();
                msec += 10;
            }, 10);
        }

        function updateTimer() {
            const pMin = min.toString().padStart(2, '0');
            const pSec = sec.toString().padStart(2, '0');
            const pMsec = msec.toString().padStart(2, '0').slice(0, 2);

            timer.textContent = `${pMin}:${pSec}:${pMsec}`;
        }
    </script>
</body>

</html>
