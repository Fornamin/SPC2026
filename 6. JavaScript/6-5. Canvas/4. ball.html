<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        canvas {
            margin: 30px;
            border: solid 1px black;
        }
    </style>
</head>

<body>
    <canvas id="canv" width="600px" height="300px"></canvas>
    <script>
        const canvas = document.getElementById('canv');
        const context = canvas.getContext('2d');

        let x = 250;
        let y = 150;
        let radius = 10;
        let speedX = 1;
        let speedY = 1.7;

        function drawBall() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.beginPath();
            context.arc(x, y, radius, 0, Math.PI * 2);
            context.fillStyle = 'red';
            context.fill();
            context.closePath();

            //x += speed; 
            x += speedX;
            y += speedY;

            if ((x + radius) > canvas.width || (x - radius) < 0)
                speedX *= -1;
            if ((y + radius) > canvas.height || (y - radius) < 0)
                speedY *= -1;

            requestAnimationFrame(drawBall);
        }

        document.body.addEventListener('keyup', (e) => {
            switch (e.key) {
                case 'ArrowLeft':
                    speedX -= 1.5;
                    break;
                case 'ArrowRight':
                    speedX += 1.5;
                    break;
                case 'ArrowUp':
                    speedY -= 1.5;
                    break;
                case 'ArrowDown':
                    speedY += 1.5;
                    break;
            }
        });

        drawBall();
    </script>
</body>

</html>
