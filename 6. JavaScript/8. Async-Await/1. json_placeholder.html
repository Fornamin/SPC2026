<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>외부 Req Test</h1>
    <button id="loadBtn">Data Req</button>
    <div class="" id="result"><!-- result --></div>
    <script>
        document.getElementById('loadBtn').addEventListener('click', async () => {
            try {
                const rs = await fetch('https://jsonplaceholder.typicode.com/todos/1');
                const data = await res.json();

                if (!res.ok) { console.log('res: ', res); }
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `<p>Id ${data.id} Title ${data.title}`;
            } catch (error) {
            console.log(error)
            }
        })
    </script>
</body>

</html>
