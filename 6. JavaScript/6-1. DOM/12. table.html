<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border-collapse: collapse;
        }
        td {
            padding: 10px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td>shell</td>            
            <td>shell</td>            
            <td>shell</td>
        </tr>
        <tr>
            <td>shell</td>            
            <td>shell</td>            
            <td>shell</td>
        </tr>
        <tr>
            <td>shell</td>            
            <td>shell</td>            
            <td>shell</td>
        </tr>
    </table>
    <br>
    <button onclick="changeOddCells()">Odd Num</button>
    <button onclick="changeEvenCells()">Even Num</button>
    <script>
        function changeOddCells() {
            const cells = document.getElementsByTagName('td');
            for (let i = 0; i < cells.length; i++) {
                if (i % 2 == 0) {
                    cells[i].style.backgroundColor = 'yellow';
                }
            }
        }

        function changeEvenCells() {
            const cells = document.getElementsByTagName('td');
            // cells가 HTMLCollections라서 일반 Array로 변환
            Array.from(cells).forEach((cell, index) => {
                if (index % 2 != 0) {
                    cell.style.backgroundColor = 'green';
                }
            })
        }
    </script>
</body>
</html>
