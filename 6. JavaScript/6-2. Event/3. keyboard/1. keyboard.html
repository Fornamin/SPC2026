<html lang="en">

<body>
    <input type="text" id="myInput" placeholder="Press any key. . .">
    <script>
        const displayKey = document.getElementById('displayKey');

        document.getElementById('myInput').addEventListener('keydown', (e) => {
            console.log('pressed key[down]: ', e.key);

            console.log('pressed key[up]: ', e.key);
        });
    </script>
</body>
