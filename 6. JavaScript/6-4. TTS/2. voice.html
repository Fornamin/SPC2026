<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <H1>TTS Example</H1>
    <textarea id="text" rows="4" cols="50">동해물과 백두산이 마르고 닳도록 대한사람 대한으로 길이 보전하세 무궁화 삼천리 화려강산 대한사람 대한으로 길이 보전하세
    </textarea><br>
    <div class="controls">
        <select id="voiceSelect"></select>
        <button id="speakBtn">Speaking</button>
    </div>
    <script>
        const voiceSelect = document.getElementById('voiceSelect');

        // Web Speech API
        if ('speechSynthesis' in window) {
            const updatedVoices = () => {
                const voices = window.speechSynthesis.getVoices();
                console.log('Available voices: ', voices);

                voiceSelect.innerHTML = ''; // 현재 목록 초기화

                voices.forEach((voice, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.text = `${voice.name} (${voice.lang})`;
                    voiceSelect.add(option);
                });
            }
            window.speechSynthesis.addEventListener('voiceschanged', updatedVoices);

            // 최초 업데이트
            updatedVoices();
        } else {
            alert('This browser does not support voice features.');
        }

        const speakText = () => {
            const selectedVoiceIndex = voiceSelect.value;
            const selectedVoice = window.speechSynthesis.getVoices()[selectedVoiceIndex];
            const text = document.getElementById('text').value;
            const speech = new SpeechSynthesisUtterance(text);
            speech.voice = selectedVoice;
            window.speechSynthesis.speak(speech);
        }

        const speakBtn = document.getElementById('speakBtn');
        speakBtn.addEventListener('click', speakText());
    </script>
</body>

</html>
