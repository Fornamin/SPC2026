<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <H1>TTS Example</H1>
    <textarea id="text" rows="4" cols="50">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Quo sit, voluptas consequatur unde ipsam dolorum ex non vitae. Incidunt, repellat corporis. Incidunt eaque quaerat libero aliquam autem modi laboriosam repudiandae!
    </textarea><br>
    <button onclick="speak()">Speaking</button>
    <script>
        function speak() {
            const text = document.getElementById('text').value;
            const speech = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(speech);
        }
    </script>
</body>
</html>
