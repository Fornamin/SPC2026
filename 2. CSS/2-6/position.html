<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            width: 350px;
            height: 150px;
            color: rgb(202, 64, 13);
            background-color: rgb(107, 189, 214);
            font-size: xx-large;
            margin: 10px;
        }

        .location {
            background-color: greenyellow;
            position: relative;
            left: 30px;
        }

        .image {
            width: 200px;
            height: 150px;
            background-image: url(../img/LongGuineaPig.jpg);
            background-size: 100%;
        }

        .image-text {
            position: relative;
            top: 20px;
            left: 60px;
        }
    </style>
</head>
<body>
    <div class="">
        1
    </div>
    <div class="location">
        2
    </div>
    <div class="">
        3
    </div>
    <div class="image">
        <p class="image-text">고양이</p>
    </div>
</body>
</html>
