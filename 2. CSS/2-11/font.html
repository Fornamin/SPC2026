<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">

    <title>Document</title>
    <style>
        .p1 { font-family: "Times New Roman"; }
        .p2 { font-family: "Arial"; }
        .p3 { font-family: "Lucida Sans"; }
        .p4 { font-family: "나눔고딕", serif; }
        .p5 { font-family: "Time New Roman", Helvetica; }
        .p6 { font-family: "Time New Roman", monospace; }
        .p7 { font-family: "굴림", "Gulim", sans-serif; }

        .p7 {
            font-family: "Roboto Slab", serif;
            font-optical-sizing: auto;
            font-style: normal;
        }
    </style>
</head>

<body>
    <h1>Font Test</h1>
    <p class="p1">This is a paragraph with "Times New Roman"</p>
    <p class="p2">This is a paragraph with "Arial"</p>
    <p class="p3">This is a paragraph with "Lucida Sans"</p>
    <p class="p4">This is a paragraph with "Serif"</p>
    <p class="p5">This is a paragraph with "Helevetica"</p>
    <p class="p6">This is a paragraph with "Times New Roman" or "Monospace"</p>
    <p class="p7">This is a paragraph with Google Fonts</p>
</body>

</html>
