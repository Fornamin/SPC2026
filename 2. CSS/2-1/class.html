<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Document</title>
        <style>
            .myDesignGreen {
                border: 3px solid #c5e56e;
                background-color: aliceblue;
                padding: 20px;
                margin: 50px;
                font-size: large;
                font-weight: bold;
            }
            .myDesignBlue {
                border: 3px solid #4a6de2;
                background-color: aliceblue;
                padding: 20px;
                margin: 50px;
                font-size: large;
                font-weight: bold;
            }
            /* CSS Selector 
                1. Tag Selector
                2. Class Selector 
                3. ID Selector
                - 밑으로 갈수록 우선 순위가 높음
            */
            #social {
                background-color: blanchedalmond;
            }
        </style>
    </head>
    <body>
        <h1>Today's News</h1>
        <p class="myDesignBlue">경제</p>        
        <p class="myDesignGreen" id="social">사회</p>        
        <p class="myDesignBlue">교육</p>        
        <p class="myDesignGreen">생활</p>    
    </body>
</html>
