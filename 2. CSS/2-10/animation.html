<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 150px;
            height: 80px;
            background-color: aquamarine;

            /* animation */
            animation-name: moveLeft;
            animation-duration: 5s;
            animation-iteration-count: infinite;
            animation-direction: alternate;
            animation-timing-function: linear;
            position: relative;
        }

        .text {
            color: black;

            animation-name: fadeOut;
            animation-direction: alternate;
            animation-iteration-count: infinite;
            animation-duration: 1.5s;
        }

        .circle {
            margin: 200px;
            width: 150px;
            height: 150px;
            background-color: rgb(220, 243, 107);
            border-radius: 30%;

            animation-name: rotateAndScale;
            animation-iteration-count: infinite;
            animation-timing-function: cubic-bezier(0.39, 0.575, 0.565, 1);
            animation-duration: 3s;
        }

        img {
            width: 500px;
            margin: 300px;

            animation-name: shake;
            animation-duration: 0.8s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }

        @keyframes moveLeft {
            0% {
                left: 0;
            }
            50% {
                left: 400px
            }
            100% {
                left: 0px
            }
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }

        @keyframes rotateAndScale {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.5); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-20px) rotate(-50deg); }
            75% { transform: translateX(20px) rotate(50deg); }
            100% { transform: translateX(0);}
        }

    </style>
</head>
<body>
    <div class="box"></div><hr>
    <div class="text">Fade Out</div><hr>
    <div class="circle"></div><hr>
    <img src="../img/LongGuineaPig.jpg">
</body>
</html>
