<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>

    <style>
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background-color: black;
            color: #fff;
            font-size: 6em;

            display: flex;
            justify-content: center;
            align-items: center;

            z-index: 1000;

            animation: fadeOut 1s ease-in-out 2s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        .content {
            opacity: 0;
            animation: fadeIn 1s ease-in-out 4s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="splash">Loading . . .</div>

    <div class="content">
        <h1>Welcome to my page</h1>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Vitae doloribus laborum sint praesentium molestias voluptates eligendi fugit distinctio deserunt odio facilis dolorum delectus dolore in explicabo, iste numquam amet nulla!</p>
    </div>
</body>
</html>
