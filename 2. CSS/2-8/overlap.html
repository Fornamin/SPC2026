<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        .contaioner {
            height: 400px;
            position: relative;
            margin: 30px;
        }

        .box1, .box2 {
            width: 100%;
            height: 100%;
            text-align: center;
            background-color: rgb(228, 124, 160);
            position: absolute;
        }

        .box2 {
            background-color: rgb(123, 229, 194);
        }

        .overlay {
            top:200px;
        }

        .box1:hover {
            z-index: 5;
            opacity: 1.0;
            transition-duration: 5s;
        }
    </style>
</head>
<body>
    <div class="contaioner">
        <div class="box1">top</div>
        <div class="box2 overlay">bottom</div>
    </div>
</body>
</html>
